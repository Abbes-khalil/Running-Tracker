<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Tracker</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">
    <form id="registerForm" class="auth-form" action="../backend/auth/register.php" method="POST">
        <h2>Register</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <div style="display: flex;">
            <div id="register" style="width: 50%;">
        <button type="submit">Register</button>
        </div>
        <div style="width: 50%;">
        <button type="button" id="loginBtn" onclick="window.location.href='login.html'" >Login</button>
        </div>
        </div>
    </form>
</body>
</html>
