<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities | RunTracker</title>
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark">R</span><span>RunTracker</span></a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="../index.html">Dashboard</a><a class="active" href="./activities.html">Activities</a><a href="./calendar.html">Calendar</a><a href="./pr.html">Records</a>
    </nav>
    <a class="button button-primary" href="./addMenu.html">+ Add run</a>
  </header>

  <main class="page-shell">
    <section class="page-title">
      <div><p class="eyebrow">Training history</p><h1>Your activities</h1></div>
      <p>View, edit, or delete the runs saved in the database.</p>
    </section>
    <div id="page-status" class="status-message" role="status" hidden></div>
    <section id="activities-list" class="run-list" aria-live="polite"><div class="loading">Loading activities...</div></section>
  </main>

  <dialog id="edit-dialog" class="edit-dialog">
    <form id="edit-form" class="dialog-form">
      <div class="dialog-heading"><h2>Edit activity</h2><button id="close-dialog" class="icon-button" type="button" aria-label="Close">×</button></div>
      <input name="id" type="hidden">
      <div class="form-grid">
        <label class="field field-wide"><span>Activity type</span><select name="run_type" required><option>Easy run</option><option>Long run</option><option>Tempo run</option><option>Intervals</option><option>Recovery run</option><option>Race</option></select></label>
        <label class="field"><span>Date</span><input name="run_date" type="date" required></label>
        <label class="field"><span>Distance <small>km</small></span><input name="distance_km" type="number" min="0.01" step="0.01" required></label>
        <label class="field"><span>Duration</span><input name="duration" type="time" step="1" required></label>
        <label class="field"><span>Average heart rate <small>optional</small></span><input name="average_heart_rate" type="number" min="30" max="250"></label>
        <label class="field field-wide"><span>Notes <small>optional</small></span><textarea name="notes" rows="3" maxlength="2000"></textarea></label>
      </div>
      <div class="status-message" role="alert" hidden></div>
      <div class="form-actions"><button class="button button-primary" type="submit">Save changes</button><button class="button button-quiet" id="cancel-dialog" type="button">Cancel</button></div>
    </form>
  </dialog>
</body>
</html>
