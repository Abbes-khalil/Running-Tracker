<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunTracker</title>
    <link rel="stylesheet" href="./assets/css/base.css">
  </head>
  <body class="min-h-screen bg-[#050505] font-sans text-white antialiased">
    <nav class="border-b border-[#262626] bg-black">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-6 py-4">
        <a href="index.html" class="font-display text-xl font-bold uppercase text-[#ccff00]">RunTracker</a>
        <div class="flex flex-wrap gap-2 text-sm font-medium">
          <a href="index.html" class="rounded-md bg-[#1a1a1a] px-3 py-2 text-[#ccff00]">Dashboard</a>
          <a href="pages/activities.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Activities</a>
          <a href="pages/calendar.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Calendar</a>
          <a href="pages/pr.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Records</a>
        </div>
      </div>
    </nav>
    <main class="mx-auto max-w-6xl p-6 md:p-10">
      <header class="mb-10 flex flex-col gap-4 border-b border-[#262626] pb-6 sm:flex-row sm:items-center sm:justify-between">
        <div><p class="font-mono text-sm uppercase tracking-[.2em] text-[#ccff00]">RunTracker</p><h1 class="mt-2 font-display text-4xl font-bold tracking-tight">Welcome back, Runner!</h1></div>
        <a href="pages/addMenu.html" class="inline-flex w-fit rounded-md bg-[#ccff00] px-4 py-2 font-semibold text-black transition hover:bg-[#b3e600]">+ New Activity</a>
      </header>
      <section class="mb-8 rounded-2xl border border-[#262626] bg-[#121212] p-6"><h2 class="font-display text-3xl font-bold">Your Running Overview</h2><p class="mt-2 text-[#a0a0a0]">Track your progress and stay motivated.</p></section>
      <section class="grid gap-6 sm:grid-cols-2 xl:grid-cols-4">
        <div class="rounded-xl border border-[#262626] border-t-4 border-t-[#ccff00] bg-[#121212] p-6"><p class="font-mono text-sm uppercase tracking-wide text-[#666]">Total Distance</p><p class="mt-2 font-display text-3xl font-bold">-- <span class="text-base text-[#666]">km</span></p></div>
        <div class="rounded-xl border border-[#262626] border-t-4 border-t-[#00e5ff] bg-[#121212] p-6"><p class="font-mono text-sm uppercase tracking-wide text-[#666]">Total Time</p><p class="mt-2 font-display text-3xl font-bold">-- <span class="text-base text-[#666]">hrs</span></p></div>
        <div class="rounded-xl border border-[#262626] border-t-4 border-t-amber-500 bg-[#121212] p-6"><p class="font-mono text-sm uppercase tracking-wide text-[#666]">Average Pace</p><p class="mt-2 font-display text-3xl font-bold">-- <span class="text-base text-[#666]">min/km</span></p></div>
        <div class="rounded-xl border border-[#262626] border-t-4 border-t-emerald-400 bg-[#121212] p-6"><p class="font-mono text-sm uppercase tracking-wide text-[#666]">Workouts</p><p class="mt-2 font-display text-3xl font-bold">-- <span class="text-base text-[#666]">sessions</span></p></div>
      </section>
    </main>
  </body>
</html>
