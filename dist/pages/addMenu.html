<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Activity | RunTracker</title>
    <link rel="stylesheet" crossorigin href="/assets/base-CwhefAO1.css">
  </head>
  <body class="min-h-screen bg-[#050505] font-sans text-white">
    <nav class="border-b border-[#262626] bg-black">
      <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
        <a href="../index.html" class="font-display text-xl font-bold uppercase tracking-[.1em] text-[#ccff00]">RunTracker</a>
        <div class="flex flex-wrap gap-2 text-sm">
          <a href="../index.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Dashboard</a>
          <a href="activities.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Activities</a>
          <a href="calendar.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Calendar</a>
          <a href="pr.html" class="rounded-md px-3 py-2 text-[#a0a0a0] hover:bg-[#1a1a1a] hover:text-white">Records</a>
        </div>
      </div>
    </nav>
    <main class="mx-auto max-w-2xl p-6">
      <section class="rounded-2xl border border-[#262626] bg-[#121212] p-8">
        <h1 class="font-display text-3xl font-bold">Add New Activity</h1>
        <form class="mt-8 grid gap-5" action="../backend/runs/create.php" method="post">
          <input class="rounded-md border border-[#262626] bg-[#1a1a1a] px-4 py-3 text-white" name="activity" placeholder="Activity type" required>
          <input class="rounded-md border border-[#262626] bg-[#1a1a1a] px-4 py-3 text-white" name="date" type="date" required>
          <input class="rounded-md border border-[#262626] bg-[#1a1a1a] px-4 py-3 text-white" name="distance" type="number" min="0" step="0.01" placeholder="Distance (km)" required>
          <textarea class="rounded-md border border-[#262626] bg-[#1a1a1a] px-4 py-3 text-white" name="notes" placeholder="Notes"></textarea>
          <button class="rounded-md bg-[#ccff00] px-4 py-3 font-semibold text-black">Save Activity</button>
        </form>
      </section>
    </main>
  </body>
</html>
