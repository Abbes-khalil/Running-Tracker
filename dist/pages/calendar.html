<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar | RunTracker</title>
  <script src="../assets/js/calendardata.js"></script>
  <script type="module" crossorigin src="/assets/modulepreload-polyfill-Dezn_h7o.js"></script>
  <script type="module" crossorigin src="assets/js/calendar.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/base-C9x2LKoe.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark">R</span><span>RunTracker</span></a>
    <nav class="main-nav" aria-label="Main navigation"><a href="../index.html">Dashboard</a><a href="./activities.html">Activities</a><a class="active" href="./calendar.html">Calendar</a><a href="./pr.html">Records</a></nav>
    <a class="button button-primary" href="./addMenu.html">+ Add run</a>
  </header>

  <main class="page-shell">
    <section class="page-title"><div><p class="eyebrow">Training schedule</p><h1>Run calendar</h1></div><p>See when you trained and how consistent you have been.</p></section>
    <div id="page-status" class="status-message" role="status" hidden></div>
    <section class="calendar-panel">
      <div class="calendar-toolbar"><button id="previous-month" class="icon-button" type="button" aria-label="Previous month">←</button><h2 id="current-month">Month</h2><button id="next-month" class="icon-button" type="button" aria-label="Next month">→</button></div>
      <div class="calendar-weekdays" aria-hidden="true"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>
  </main>

</body>
</html>
