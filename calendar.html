<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Fit Tracker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page">
    <nav id="navbar">
        <h1>Fit Tracker</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="calendar.html" class="active">Calendar</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="pr.html">Personal record</a></li>
        </ul>
    </nav>
    <button id="toggleBtn">☰</button>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="calendar-nav-btn">‹</button>
            <h2 id="currentMonth"></h2>
            <button class="calendar-nav-btn">›</button>
        </div>

        <div class="calendar-weekdays">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <!-- Calendar days will be populated by JavaScript -->
        </div>
    </div>

    <script type="module" src="/scripts/functions.js"></script>
    <script type="module" src="/scripts/calendar.js"></script>
</body>
</html>
