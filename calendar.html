<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Fit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="scripts/firebase-config.js"></script>
</head>
<body class="page">
    <nav id="navbar">
        <h1>Fit Tracker</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="calendar.html" class="active">Calendar</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="pr.html">Personal record</a></li>
        </ul>
    </nav>
    <button id="toggleBtn" onclick="toggleMenu()">☰</button>
    
    <div class="calendar-container">
        <div class="calendar-header">
            <button class="calendar-nav-btn" onclick="previousMonth()">‹</button>
            <h2 id="currentMonth"></h2>
            <button class="calendar-nav-btn" onclick="nextMonth()">›</button>
        </div>
        
        <div class="calendar-weekdays">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
        </div>
        
        <div class="calendar-grid" id="calendarGrid">
            <!-- Calendar days will be populated by JavaScript -->
        </div>
    </div>

    <script src="scripts/functions.js"></script>
    <script>
        let currentDate = new Date();

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Update header
            const monthYear = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            document.getElementById('currentMonth').textContent = monthYear;
            
            // Clear grid
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            // Get first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Add empty cells for days before month starts
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-day empty';
                grid.appendChild(emptyCell);
            }
            
            // Add days of month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                
                // Highlight today
                const today = new Date();
                if (day === today.getDate() && 
                    month === today.getMonth() && 
                    year === today.getFullYear()) {
                    dayCell.classList.add('today');
                }
                
                dayCell.textContent = day;
                dayCell.style.cursor = 'pointer';
                dayCell.onclick = () => selectDay(day, month, year, dayCell);
                
                grid.appendChild(dayCell);
            }
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function selectDay(day, month, year, element) {
            // Remove previous selection
            document.querySelectorAll('.calendar-day.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            // Add selection to clicked day
            element.classList.add('selected');
            console.log(`Selected: ${day}/${month + 1}/${year}`);
        }

        // Initialize calendar
        renderCalendar();
    </script>
</body>
</html>
